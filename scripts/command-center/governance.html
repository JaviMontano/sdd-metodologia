<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Governance &mdash; SDD ALM</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Montserrat:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/tokens.css">
  <script src="shared/search.js" defer></script>
  <script src="shared/data.js"></script>
  <script src="shared/nav.js" defer></script>
  <script src="shared/footer.js" defer></script>
  <style>
    .gov-main { max-width:1280px; margin:0 auto; padding:2rem 1.5rem 3rem; }
    .page-header { margin-bottom:2rem; }
    .page-title { font-size:1.75rem; font-weight:900; margin-bottom:0.25rem; }
    .page-title .gold { color:var(--brand-gold); }
    .page-subtitle { color:var(--text-muted); font-size:0.9rem; }

    .section-title {
      font-size:1.1rem; font-weight:700; margin-bottom:1rem;
      display:flex; align-items:center; gap:0.5rem;
    }

    /* Constitution */
    .constitution-section { margin-bottom:2.5rem; }
    .constitution-toggle {
      display:flex; align-items:center; gap:0.5rem;
      cursor:pointer; user-select:none; width:100%;
      background:none; border:none; text-align:left;
      font-family:var(--font-heading); font-size:1rem; font-weight:700;
      color:var(--text-primary); padding:0.75rem 1rem;
    }
    .constitution-toggle .toggle-chevron {
      display:inline-block; transition:transform var(--transition-fast);
      font-size:0.8rem; color:var(--text-dim);
    }
    .constitution-toggle .toggle-chevron.open { transform:rotate(90deg); }
    .constitution-body { padding:0 1rem 1rem; }
    .constitution-body.collapsed { display:none; }

    .principle-item {
      display:flex; gap:0.75rem; padding:0.75rem 0;
      border-bottom:1px solid var(--border-subtle);
    }
    .principle-item:last-child { border-bottom:none; }
    .principle-number {
      font-family:var(--font-heading); font-weight:900; font-size:1.2rem;
      color:var(--brand-gold); min-width:48px; text-align:center;
      flex-shrink:0;
    }
    .principle-content { flex:1; }
    .principle-name {
      font-family:var(--font-heading); font-weight:700; font-size:0.9rem;
      color:var(--text-primary); margin-bottom:0.2rem;
      display:flex; align-items:center; gap:0.5rem;
    }
    .level-badge {
      font-size:0.65rem; font-weight:700; padding:1px 7px;
      border-radius:10px; text-transform:uppercase;
    }
    .level-must { background:rgba(255,215,0,0.15); color:var(--brand-gold); }
    .level-should { background:rgba(19,125,197,0.12); color:var(--brand-blue); }
    .principle-text { font-size:0.82rem; color:var(--text-muted); line-height:1.55; }
    .principle-rationale { font-size:0.75rem; color:var(--text-dim); margin-top:0.25rem; font-style:italic; }

    /* Radar Chart */
    .radar-section { margin-bottom:2.5rem; }
    .radar-container { display:flex; justify-content:center; padding:1rem; }
    .radar-svg { max-width:420px; width:100%; height:auto; }
    .radar-axis-label {
      font-family:var(--font-body); font-size:11px; fill:var(--text-muted);
      text-anchor:middle; dominant-baseline:central;
    }

    /* Quality Gates */
    .gates-section { margin-bottom:2.5rem; }
    .gates-flow { display:flex; align-items:center; gap:0; justify-content:center; flex-wrap:wrap; }
    .gate-card {
      display:flex; flex-direction:column; align-items:center; gap:0.4rem;
      padding:1.25rem 1.5rem; min-width:140px;
      background:var(--bg-card); backdrop-filter:var(--glass);
      border:1px solid var(--border-subtle); border-radius:var(--radius-card);
      transition:transform var(--transition-normal), box-shadow var(--transition-normal);
    }
    .gate-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-glow-gold); }
    .gate-name { font-family:var(--font-heading); font-weight:900; font-size:1.1rem; }
    .gate-label { font-size:0.75rem; color:var(--text-muted); }
    .gate-status-badge {
      font-size:0.7rem; font-weight:600; padding:2px 10px;
      border-radius:12px; text-transform:uppercase;
    }
    .gate-passed { background:rgba(19,125,197,0.15); color:var(--brand-blue); }
    .gate-pending { background:rgba(255,215,0,0.12); color:var(--brand-gold); }
    .gate-blocked { background:rgba(239,68,68,0.12); color:var(--brand-red); }
    .gate-connector {
      width:40px; height:2px; background:var(--border-medium); flex-shrink:0;
      position:relative;
    }
    .gate-connector::after {
      content:''; position:absolute; right:-3px; top:-4px;
      width:0; height:0;
      border-left:6px solid var(--border-medium);
      border-top:5px solid transparent;
      border-bottom:5px solid transparent;
    }

    /* Evidence Tags */
    .evidence-section { margin-bottom:2.5rem; }
    .evidence-pills { display:flex; flex-wrap:wrap; gap:0.75rem; }
    .evidence-pill {
      display:inline-flex; align-items:center; gap:0.4rem;
      padding:0.5rem 1rem; border-radius:var(--radius-full);
      font-family:var(--font-mono); font-size:0.8rem; font-weight:600;
      border:1px solid var(--border-subtle);
      background:var(--bg-card); backdrop-filter:var(--glass);
    }
    .pill-code { border-color:rgba(19,125,197,0.25); color:var(--brand-blue); }
    .pill-config { border-color:rgba(255,215,0,0.25); color:var(--brand-gold); }
    .pill-doc { border-color:rgba(139,92,246,0.25); color:var(--brand-purple); }
    .pill-inference { border-color:rgba(249,115,22,0.25); color:var(--brand-orange); }
    .pill-assumption { border-color:rgba(239,68,68,0.25); color:var(--brand-red); }

    /* DoD Section */
    .dod-section { margin-bottom:2.5rem; }
    .dod-toggle {
      display:flex; align-items:center; gap:0.5rem;
      cursor:pointer; user-select:none; width:100%;
      background:none; border:none; text-align:left;
      font-family:var(--font-heading); font-size:0.95rem; font-weight:700;
      color:var(--text-primary); padding:0.65rem 1rem;
    }
    .dod-toggle .toggle-chevron {
      display:inline-block; transition:transform var(--transition-fast);
      font-size:0.8rem; color:var(--text-dim);
    }
    .dod-toggle .toggle-chevron.open { transform:rotate(90deg); }
    .dod-body { padding:0 1rem 1rem; }
    .dod-body.collapsed { display:none; }
    .dod-phase {
      padding:0.5rem 0; border-bottom:1px solid var(--border-subtle);
    }
    .dod-phase:last-child { border-bottom:none; }
    .dod-phase-name {
      font-family:var(--font-heading); font-weight:600; font-size:0.85rem;
      color:var(--brand-gold); margin-bottom:0.2rem;
    }
    .dod-criteria { font-size:0.8rem; color:var(--text-muted); line-height:1.55; }

    /* Operational Logs */
    .ops-section { margin-bottom:2rem; }
    .ops-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1.25rem; }
    .ops-card .card { text-align:center; }
    .ops-icon { font-size:1.5rem; margin-bottom:0.5rem; }
    .ops-name { font-family:var(--font-heading); font-weight:700; font-size:0.9rem; margin-bottom:0.25rem; }
    .ops-count { font-family:var(--font-mono); font-size:0.8rem; color:var(--text-muted); }
    .ops-status-dot {
      display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:0.3rem;
    }
    .ops-exists { background:var(--brand-blue); }
    .ops-missing { background:var(--brand-red); }

    /* No data */
    .no-data { text-align:center; padding:3rem 1rem; }
    .no-data-icon { font-size:3rem; margin-bottom:1rem; opacity:0.4; }
    .no-data-text { color:var(--text-dim); font-size:0.95rem; margin-bottom:1rem; }
    .empty-state {
      text-align:center; padding:2rem; color:var(--text-dim); font-size:0.85rem;
      border:1px dashed var(--border-medium); border-radius:var(--radius-sm);
    }

    /* ── Search & Filter ────────────────────────────────────── */
    .sdd-search-bar { margin-bottom: 1.5rem; }
    .sdd-search-input-wrap { position: relative; display: flex; align-items: center; }
    .sdd-search-icon { position: absolute; left: 12px; width: 18px; height: 18px; color: #94A3B8; pointer-events: none; }
    .sdd-search-input { width: 100%; padding: 10px 12px 10px 40px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #E2E8F0; font-family: var(--font-body, Montserrat, sans-serif); font-size: 14px; outline: none; transition: border-color 0.2s; }
    .sdd-search-input:focus { border-color: #FFD700; box-shadow: 0 0 0 2px rgba(255,215,0,0.15); }
    .sdd-search-count { position: absolute; right: 12px; font-size: 11px; color: #64748B; font-family: var(--font-mono, 'JetBrains Mono', monospace); }
    .sdd-filter-chips { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .sdd-chip { padding: 5px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #94A3B8; font-size: 12px; cursor: pointer; font-family: var(--font-body, Montserrat, sans-serif); transition: all 0.2s; }
    .sdd-chip:hover { border-color: rgba(255,215,0,0.3); color: #E2E8F0; }
    .sdd-chip.active { background: rgba(255,215,0,0.12); border-color: #FFD700; color: #FFD700; }

    /* ── Operational Logs Timeline ──────────────────────────── */
    .ops-timeline-section { margin-bottom:2rem; }
    .ops-timeline { display:flex; flex-direction:column; gap:0; padding-left:1.5rem; border-left:2px solid var(--border-medium); max-height:400px; overflow-y:auto; }
    .ops-tl-item { position:relative; padding:0.55rem 0 0.55rem 1.25rem; }
    .ops-tl-item::before {
      content:''; position:absolute; left:-1.5rem; top:0.75rem; transform:translateX(-50%);
      width:10px; height:10px; border-radius:50%;
      border:2px solid var(--bg-body);
    }
    .ops-tl-item.type-changelog::before { background:var(--brand-blue); }
    .ops-tl-item.type-tasklog::before { background:var(--brand-gold); }
    .ops-tl-item.type-decision::before { background:var(--brand-purple); }
    .ops-tl-item.type-default::before { background:var(--text-dim); }
    .ops-tl-date { font-size:0.7rem; color:var(--text-dim); font-family:var(--font-mono); }
    .ops-tl-row { display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; }
    .ops-tl-badge {
      font-size:0.65rem; font-weight:600; padding:1px 6px;
      border-radius:10px; text-transform:uppercase;
    }
    .ops-tl-badge.badge-changelog { background:rgba(19,125,197,0.12); color:var(--brand-blue); }
    .ops-tl-badge.badge-tasklog { background:rgba(255,215,0,0.12); color:var(--brand-gold); }
    .ops-tl-badge.badge-decision { background:rgba(139,92,246,0.12); color:var(--brand-purple); }
    .ops-tl-badge.badge-default { background:rgba(148,163,184,0.12); color:var(--text-muted); }
    .ops-tl-desc { font-size:0.82rem; color:var(--text-muted); }
    .ops-tl-principles { font-size:0.7rem; color:var(--text-dim); font-style:italic; margin-top:0.15rem; }
    .adr-badge {
      font-size:0.6rem; font-weight:700; padding:1px 5px; border-radius:6px;
      display:inline-block; margin-left:0.4rem;
    }
    .adr-accepted { background:rgba(19,125,197,0.15); color:var(--brand-blue); }
    .adr-proposed { background:rgba(255,215,0,0.12); color:var(--brand-gold); }
    .adr-rejected { background:rgba(239,68,68,0.12); color:var(--brand-red); }

    @media(max-width:960px) { .ops-grid { grid-template-columns:repeat(2,1fr); } }
    @media(max-width:600px) {
      .ops-grid { grid-template-columns:1fr; }
      .gates-flow { flex-direction:column; }
      .gate-connector { width:2px; height:30px; }
      .gate-connector::after {
        right:auto; top:auto; bottom:-3px; left:-4px;
        border-left:5px solid transparent; border-right:5px solid transparent;
        border-top:6px solid var(--border-medium); border-bottom:none;
      }
    }
  </style>
</head>
<body>

<main class="gov-main" id="gov-root">
  <div id="page-search"></div>
  <!-- Populated by script -->
</main>

<script>
(function () {
  'use strict';

  function D() { return window.DASHBOARD_DATA || null; }
  function get(path, fallback) {
    try {
      return path.split('.').reduce(function (o, k) { return o[k]; }, D()) ?? fallback;
    } catch (_) { return fallback; }
  }

  var root = document.getElementById('gov-root');

  if (!D()) {
    root.innerHTML =
      '<div class="no-data">' +
        '<div class="no-data-icon">&#x2696;</div>' +
        '<h2 style="margin-bottom:0.5rem">No Data Loaded</h2>' +
        '<p class="no-data-text">Run <code style="color:var(--brand-gold)">/sdd:dashboard</code> to generate the <code>data.js</code> file, then refresh this page.</p>' +
      '</div>';
    return;
  }

  var projectName = get('project.name', 'SDD Project');

  /* ── Constitution ─────────────────────────────────────────── */
  var principles = get('constitution.principles', []);

  var constitutionHTML = '';
  if (principles.length > 0) {
    constitutionHTML =
      '<section class="constitution-section">' +
        '<h3 class="section-title">&#x1F4DC; Constitution</h3>' +
        '<div class="card" style="padding:0;overflow:hidden">' +
          '<button class="constitution-toggle" onclick="this.querySelector(\'.toggle-chevron\').classList.toggle(\'open\');this.nextElementSibling.classList.toggle(\'collapsed\')">' +
            '<span class="toggle-chevron open">&#x25B6;</span>' +
            '<span>' + principles.length + ' Principle' + (principles.length !== 1 ? 's' : '') + '</span>' +
          '</button>' +
          '<div class="constitution-body">' +
          principles.map(function (p) {
            var num = p.number || p.id || '?';
            var name = p.name || p.title || 'Principle';
            var level = (p.level || 'MUST').toUpperCase();
            var levelClass = level === 'MUST' ? 'level-must' : 'level-should';
            var text = p.text || p.description || '';
            var rationale = p.rationale || '';
            return '<div class="principle-item">' +
              '<div class="principle-number">' + num + '</div>' +
              '<div class="principle-content">' +
                '<div class="principle-name">' + name + ' <span class="level-badge ' + levelClass + '">' + level + '</span></div>' +
                (text ? '<div class="principle-text">' + text + '</div>' : '') +
                (rationale ? '<div class="principle-rationale">' + rationale + '</div>' : '') +
              '</div>' +
            '</div>';
          }).join('') +
          '</div>' +
        '</div>' +
      '</section>';
  } else {
    constitutionHTML =
      '<section class="constitution-section">' +
        '<h3 class="section-title">&#x1F4DC; Constitution</h3>' +
        '<div class="empty-state">No constitution defined yet &mdash; run <code style="color:var(--brand-gold)">/sdd:00-constitution</code> to create governance principles</div>' +
      '</section>';
  }

  /* ── Radar Chart ──────────────────────────────────────────── */
  var radarAxes = [
    { label: 'Skills-First', key: 'skills-first' },
    { label: 'Multi-Agent', key: 'multi-agent' },
    { label: 'Cross-Platform', key: 'cross-platform' },
    { label: 'Phase Separation', key: 'phase-separation' },
    { label: 'Self-Validating', key: 'self-validating' }
  ];

  // Derive scores from principles presence
  var radarScores = radarAxes.map(function (axis) {
    var found = false;
    principles.forEach(function (p) {
      var text = ((p.name || '') + ' ' + (p.text || '')).toLowerCase();
      if (text.indexOf(axis.key.replace('-', ' ')) !== -1 || text.indexOf(axis.key) !== -1) {
        found = true;
      }
    });
    // Default to 0.7 if we have principles, scale by principle count
    if (principles.length === 0) return 0;
    return found ? 0.85 : 0.45;
  });

  var CX = 200, CY = 200, R_MAX = 150;
  var N = radarAxes.length;
  var angleStep = (2 * Math.PI) / N;
  var startAngle = -Math.PI / 2;

  function polar(cx, cy, r, angle) {
    return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
  }

  // Grid rings
  var rings = [0.25, 0.5, 0.75, 1.0];
  var gridLines = rings.map(function (frac) {
    var pts = [];
    for (var i = 0; i < N; i++) {
      var p = polar(CX, CY, R_MAX * frac, startAngle + i * angleStep);
      pts.push(p.x.toFixed(1) + ',' + p.y.toFixed(1));
    }
    return '<polygon points="' + pts.join(' ') + '" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';
  }).join('');

  // Axis lines
  var axisLines = '';
  for (var i = 0; i < N; i++) {
    var ep = polar(CX, CY, R_MAX, startAngle + i * angleStep);
    axisLines += '<line x1="' + CX + '" y1="' + CY + '" x2="' + ep.x.toFixed(1) + '" y2="' + ep.y.toFixed(1) + '" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>';
  }

  // Data polygon
  var dataPoints = radarScores.map(function (s, i) {
    var p = polar(CX, CY, R_MAX * s, startAngle + i * angleStep);
    return p.x.toFixed(1) + ',' + p.y.toFixed(1);
  }).join(' ');

  // Labels
  var labels = radarAxes.map(function (axis, i) {
    var lp = polar(CX, CY, R_MAX + 28, startAngle + i * angleStep);
    return '<text class="radar-axis-label" x="' + lp.x.toFixed(1) + '" y="' + lp.y.toFixed(1) + '">' + axis.label + '</text>';
  }).join('');

  // Dots
  var dots = radarScores.map(function (s, i) {
    var p = polar(CX, CY, R_MAX * s, startAngle + i * angleStep);
    return '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="4" fill="#FFD700" stroke="var(--bg-body)" stroke-width="2"/>';
  }).join('');

  var radarHTML =
    '<section class="radar-section">' +
      '<h3 class="section-title">&#x1F578; Principles Radar</h3>' +
      '<div class="card">' +
        '<div class="radar-container">' +
          '<svg class="radar-svg" viewBox="0 0 400 400">' +
            gridLines +
            axisLines +
            '<polygon points="' + dataPoints + '" fill="rgba(255,215,0,0.15)" stroke="#FFD700" stroke-width="2"/>' +
            dots +
            labels +
          '</svg>' +
        '</div>' +
      '</div>' +
    '</section>';

  /* ── Quality Gates ────────────────────────────────────────── */
  var features = get('features', []);
  var phases = {};
  features.forEach(function (f) {
    var ph = (f.phase || f.status || '').toLowerCase();
    phases[ph] = true;
  });

  function gateStatus(gatePhases) {
    var passed = gatePhases.some(function (p) { return phases[p]; });
    if (passed) return 'passed';
    if (features.length === 0) return 'pending';
    return 'pending';
  }

  var gates = [
    { name: 'G0', label: 'Constitution', phases: ['constitution', 'phase-0'] },
    { name: 'G1', label: 'Spec + Plan', phases: ['plan', 'phase-2', 'specify'] },
    { name: 'G2', label: 'Test + Analyze', phases: ['analyze', 'phase-6', 'testify'] },
    { name: 'G3', label: 'Implement + Ship', phases: ['implement', 'ship', 'phase-7', 'phase-8'] }
  ];

  var gatesHTML =
    '<section class="gates-section">' +
      '<h3 class="section-title">&#x1F6A7; Quality Gates</h3>' +
      '<div class="gates-flow">' +
      gates.map(function (g, idx) {
        var status = gateStatus(g.phases);
        var statusClass = 'gate-' + status;
        var statusText = status.charAt(0).toUpperCase() + status.slice(1);
        var connector = idx < gates.length - 1 ? '<div class="gate-connector"></div>' : '';
        return '<div class="gate-card">' +
          '<div class="gate-name" style="color:var(--brand-gold)">' + g.name + '</div>' +
          '<div class="gate-label">' + g.label + '</div>' +
          '<span class="gate-status-badge ' + statusClass + '">' + statusText + '</span>' +
        '</div>' + connector;
      }).join('') +
      '</div>' +
    '</section>';

  /* ── Evidence Tags ────────────────────────────────────────── */
  var evidenceHTML =
    '<section class="evidence-section">' +
      '<h3 class="section-title">&#x1F3F7; Evidence Tags</h3>' +
      '<div class="evidence-pills">' +
        '<span class="evidence-pill pill-code">[CODE]</span>' +
        '<span class="evidence-pill pill-config">[CONFIG]</span>' +
        '<span class="evidence-pill pill-doc">[DOC]</span>' +
        '<span class="evidence-pill pill-inference">[INFERENCE]</span>' +
        '<span class="evidence-pill pill-assumption">[ASSUMPTION]</span>' +
      '</div>' +
      '<p style="margin-top:0.75rem;font-size:0.8rem;color:var(--text-dim)">Every claim in SDD artifacts must carry an evidence tag. If &gt;30% are [ASSUMPTION], a warning banner is mandatory.</p>' +
    '</section>';

  /* ── Definition of Done ───────────────────────────────────── */
  var dodPhases = [
    { name: 'Phase 0 &mdash; Constitution', criteria: 'Principles defined, numbered, with MUST/SHOULD levels and rationale.' },
    { name: 'Phase 1 &mdash; Specify', criteria: 'User stories in Given/When/Then, FR numbered, acceptance criteria complete.' },
    { name: 'Phase 2 &mdash; Plan', criteria: 'Architecture diagram, data model, API contracts. Gate G1 passed.' },
    { name: 'Phase 3 &mdash; Checklist', criteria: 'Requirements quality checklist completed. All items addressed.' },
    { name: 'Phase 4 &mdash; Testify', criteria: 'Gherkin scenarios with assertion hashes. Coverage &ge; 80%.' },
    { name: 'Phase 5 &mdash; Tasks', criteria: 'Dependency-ordered task breakdown. Estimated effort assigned.' },
    { name: 'Phase 6 &mdash; Analyze', criteria: 'Cross-artifact consistency verified. Gate G2 passed. Zero orphans.' },
    { name: 'Phase 7 &mdash; Implement', criteria: 'All tests passing. Code review done. Gate G3 passed.' },
    { name: 'Phase 8 &mdash; Ship', criteria: 'GitHub Issues exported. Deployment verified. Loop closed.' }
  ];

  var dodHTML =
    '<section class="dod-section">' +
      '<h3 class="section-title">&#x2705; Definition of Done</h3>' +
      '<div class="card" style="padding:0;overflow:hidden">' +
        '<button class="dod-toggle" onclick="this.querySelector(\'.toggle-chevron\').classList.toggle(\'open\');this.nextElementSibling.classList.toggle(\'collapsed\')">' +
          '<span class="toggle-chevron">&#x25B6;</span>' +
          '<span>Per-Phase DoD (' + dodPhases.length + ' phases)</span>' +
        '</button>' +
        '<div class="dod-body collapsed">' +
        dodPhases.map(function (ph) {
          return '<div class="dod-phase">' +
            '<div class="dod-phase-name">' + ph.name + '</div>' +
            '<div class="dod-criteria">' + ph.criteria + '</div>' +
          '</div>';
        }).join('') +
        '</div>' +
      '</div>' +
    '</section>';

  /* ── Operational Logs ─────────────────────────────────────── */
  var sessionLog = get('sessionLog', []);
  var workspace = get('workspace', {});
  var wsFiles = workspace.files || [];
  var fileNames = [];
  if (Array.isArray(wsFiles)) {
    wsFiles.forEach(function (f) {
      fileNames.push(typeof f === 'string' ? f : (f.path || f.name || ''));
    });
  }

  function logExists(pattern) {
    return fileNames.some(function (fn) { return fn.indexOf(pattern) !== -1; });
  }

  var opsLogs = [
    {
      name: 'Task Log',
      icon: '&#x1F4CB;',
      pattern: 'tasklog',
      count: sessionLog.filter(function (e) { return (e.type || '').indexOf('task') !== -1; }).length
    },
    {
      name: 'Changelog',
      icon: '&#x1F4DD;',
      pattern: 'changelog',
      count: sessionLog.filter(function (e) { return (e.type || '').indexOf('change') !== -1; }).length
    },
    {
      name: 'Decision Log',
      icon: '&#x2696;',
      pattern: 'decision',
      count: sessionLog.filter(function (e) { return (e.type || '').indexOf('decision') !== -1; }).length
    }
  ];

  var opsHTML =
    '<section class="ops-section">' +
      '<h3 class="section-title">&#x1F4C8; Operational Logs</h3>' +
      '<div class="ops-grid">' +
      opsLogs.map(function (log) {
        var exists = logExists(log.pattern);
        return '<div class="ops-card"><div class="card">' +
          '<div class="ops-icon">' + log.icon + '</div>' +
          '<div class="ops-name">' + log.name + '</div>' +
          '<div class="ops-count">' +
            '<span class="ops-status-dot ' + (exists || log.count > 0 ? 'ops-exists' : 'ops-missing') + '"></span>' +
            (exists || log.count > 0 ? log.count + ' entries' : 'Not found') +
          '</div>' +
        '</div></div>';
      }).join('') +
      '</div>' +
    '</section>';

  /* ── Operational Logs Timeline ─────────────────────────────── */
  var changelog = get('changelog', []);
  var tasklog = get('tasklog', []);
  var decisionLog = get('decisionLog', []);

  var allOpsEntries = [];
  if (Array.isArray(changelog)) {
    changelog.forEach(function(e) {
      allOpsEntries.push({ date: e.date || e.timestamp || '', type: 'changelog', desc: e.description || e.message || e.change || '', principles: e.principles || '' });
    });
  }
  if (Array.isArray(tasklog)) {
    tasklog.forEach(function(e) {
      allOpsEntries.push({ date: e.date || e.timestamp || '', type: 'tasklog', desc: e.description || e.task || e.message || '', principles: e.principles || '' });
    });
  }
  if (Array.isArray(decisionLog)) {
    decisionLog.forEach(function(e) {
      var adrStatus = (e.status || e.adrStatus || 'proposed').toLowerCase();
      var adrClass = adrStatus.indexOf('accept') !== -1 ? 'adr-accepted' : adrStatus.indexOf('reject') !== -1 ? 'adr-rejected' : 'adr-proposed';
      allOpsEntries.push({ date: e.date || e.timestamp || '', type: 'decision', desc: e.description || e.title || e.decision || '', principles: e.principles || '', adrStatus: adrStatus, adrClass: adrClass });
    });
  }
  // Sort by date descending
  allOpsEntries.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });

  var opsTimelineHTML = '';
  if (allOpsEntries.length > 0) {
    opsTimelineHTML =
      '<section class="ops-timeline-section">' +
        '<h3 class="section-title">&#x1F4C5; Operational Logs Timeline</h3>' +
        '<div class="ops-timeline">' +
        allOpsEntries.map(function(e) {
          var badgeClass = 'badge-' + e.type;
          var adrBadge = e.adrStatus ? ' <span class="adr-badge ' + e.adrClass + '">' + e.adrStatus + '</span>' : '';
          return '<div class="ops-tl-item type-' + e.type + '">' +
            '<div class="ops-tl-row">' +
              '<span class="ops-tl-date">' + e.date + '</span>' +
              '<span class="ops-tl-badge ' + badgeClass + '">' + e.type + '</span>' +
              adrBadge +
            '</div>' +
            '<div class="ops-tl-desc">' + e.desc + '</div>' +
            (e.principles ? '<div class="ops-tl-principles">Principles: ' + e.principles + '</div>' : '') +
          '</div>';
        }).join('') +
        '</div>' +
      '</section>';
  }

  /* ── Render ───────────────────────────────────────────────── */
  root.innerHTML =
    '<header class="page-header">' +
      '<h1 class="page-title"><span class="gold">&#x2696;</span> Governance</h1>' +
      '<p class="page-subtitle">Constitution, quality gates, and operational governance for ' + projectName + '</p>' +
    '</header>' +
    constitutionHTML +
    radarHTML +
    gatesHTML +
    evidenceHTML +
    dodHTML +
    opsHTML +
    opsTimelineHTML;

  // Search + Filter
  setTimeout(function() {
    var ctrl = SDD.search.init('page-search', {
      placeholder: 'Search principles...',
      filters: [{label:'MUST',value:'MUST'}, {label:'SHOULD',value:'SHOULD'}],
      onSearch: function(q, f) { filterItems(q, f); },
      onFilter: function(f, q) { filterItems(q, f); }
    });
    function filterItems(query, filter) {
      var items = document.querySelectorAll('.principle-item');
      var shown = 0, total = items.length;
      items.forEach(function(item) {
        var text = item.textContent.toLowerCase();
        var levelBadge = item.querySelector('.level-badge');
        var level = levelBadge ? levelBadge.textContent.trim().toUpperCase() : '';
        var matchQuery = !query || text.indexOf(query) !== -1;
        var matchFilter = !filter || filter === 'all' || level === filter;
        if (matchQuery && matchFilter) { item.style.display = ''; shown++; }
        else { item.style.display = 'none'; }
      });
      // Also filter ops timeline entries
      var tlItems = document.querySelectorAll('.ops-tl-item');
      tlItems.forEach(function(item) {
        var text = item.textContent.toLowerCase();
        var matchQuery = !query || text.indexOf(query) !== -1;
        if (matchQuery) { item.style.display = ''; }
        else { item.style.display = 'none'; }
      });
      ctrl.setCount(shown, total);
    }
  }, 100);
})();
</script>

</body>
</html>
