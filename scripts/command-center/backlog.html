<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feature Backlog &mdash; SDD ALM</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Montserrat:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/tokens.css">
  <script src="shared/data.js"></script>
  <script src="shared/nav.js" defer></script>
  <script src="shared/footer.js" defer></script>
  <script src="shared/search.js" defer></script>
  <style>
    .bl-main { max-width:1320px; margin:0 auto; padding:2rem 1.5rem 3rem; }
    .page-title { font-size:1.5rem; font-weight:900; margin-bottom:0.35rem; }
    .page-title .gold { color:var(--brand-gold, #FFD700); }
    .page-subtitle { color:var(--text-muted, #94a3b8); font-size:0.9rem; margin-bottom:1.5rem; }

    /* ── Stats Row ──────────────────────────────────────────── */
    .stats-row { display:flex; gap:1rem; margin-bottom:1.75rem; flex-wrap:wrap; }
    .stat-card {
      background:rgba(255,255,255,0.03);
      backdrop-filter:blur(16px) saturate(180%);
      -webkit-backdrop-filter:blur(16px) saturate(180%);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:10px; padding:0.9rem 1.2rem; min-width:140px; flex:1;
    }
    .stat-card .stat-value { font-family:'Poppins',sans-serif; font-weight:700; font-size:1.5rem; color:#FFD700; }
    .stat-card .stat-label { font-size:0.75rem; color:var(--text-muted, #94a3b8); margin-top:0.15rem; }

    /* ── Search & Sort ─────────────────────────────────────── */
    #backlog-search { margin-bottom:1.5rem; }
    .sort-bar { display:flex; align-items:center; gap:0.75rem; margin-bottom:1.5rem; }
    .sort-bar label { font-size:0.8rem; color:var(--text-muted, #94a3b8); }
    .sort-bar select {
      background:rgba(255,255,255,0.05); color:#e2e8f0; border:1px solid rgba(255,255,255,0.1);
      border-radius:6px; padding:0.35rem 0.65rem; font-size:0.8rem; font-family:'Montserrat',sans-serif;
    }

    /* ── Board ──────────────────────────────────────────────── */
    .board { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1.25rem; }
    @media(max-width:900px) { .board { grid-template-columns:1fr; } }

    .board-col { min-width:0; }
    .col-header {
      font-family:'Poppins',sans-serif; font-weight:700; font-size:0.95rem;
      display:flex; align-items:center; gap:0.5rem;
      padding-bottom:0.65rem; margin-bottom:0.75rem;
      border-bottom:2px solid rgba(255,255,255,0.06);
    }
    .col-header .col-icon { font-size:1.1rem; }
    .col-count {
      background:rgba(255,255,255,0.08); border-radius:10px;
      font-size:0.7rem; padding:0.15rem 0.55rem; font-weight:600; color:#FFD700;
    }

    /* ── Cards ──────────────────────────────────────────────── */
    .bl-card {
      background:rgba(255,255,255,0.03);
      backdrop-filter:blur(16px) saturate(180%);
      -webkit-backdrop-filter:blur(16px) saturate(180%);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:10px; padding:0.85rem 1rem; margin-bottom:0.65rem;
      cursor:pointer; transition:border-color 0.2s, box-shadow 0.2s;
    }
    .bl-card:hover { border-color:rgba(255,215,0,0.25); box-shadow:0 0 12px rgba(255,215,0,0.06); }
    .bl-card.expanded { border-color:rgba(255,215,0,0.35); }

    .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:0.5rem; margin-bottom:0.45rem; }
    .card-name { font-family:'Poppins',sans-serif; font-weight:700; font-size:0.85rem; color:#e2e8f0; flex:1; }
    .card-badges { display:flex; gap:0.35rem; flex-shrink:0; align-items:center; }

    .badge {
      font-size:0.65rem; font-weight:600; padding:0.15rem 0.5rem; border-radius:6px;
      font-family:'JetBrains Mono',monospace; text-transform:uppercase; letter-spacing:0.03em;
    }
    .badge-p0 { background:rgba(239,68,68,0.15); color:#EF4444; }
    .badge-p1 { background:rgba(255,215,0,0.15); color:#FFD700; }
    .badge-p2 { background:rgba(19,125,197,0.15); color:#137DC5; }
    .badge-phase { background:rgba(255,215,0,0.1); color:#FFD700; font-family:'Montserrat',sans-serif; }
    .badge-effort {
      background:rgba(255,255,255,0.06); color:#94a3b8;
      font-family:'JetBrains Mono',monospace; font-size:0.6rem;
    }
    .stale-dot {
      width:7px; height:7px; border-radius:50%; background:#FFD700;
      display:inline-block; flex-shrink:0; title: 'Stale — no activity > 7 days';
    }

    /* Progress bar */
    .progress-track {
      height:4px; background:rgba(255,255,255,0.06); border-radius:2px;
      margin:0.45rem 0 0.4rem; overflow:hidden;
    }
    .progress-fill { height:100%; background:#FFD700; border-radius:2px; transition:width 0.3s; }

    /* Stats row inside card */
    .card-stats {
      display:flex; gap:0.75rem; font-size:0.7rem; color:var(--text-muted, #94a3b8);
      font-family:'JetBrains Mono',monospace;
    }
    .card-stats span { display:flex; align-items:center; gap:0.2rem; }

    /* Expanded section */
    .card-expand {
      max-height:0; overflow:hidden; transition:max-height 0.3s ease;
      border-top:1px solid rgba(255,255,255,0.04); margin-top:0;
    }
    .bl-card.expanded .card-expand { max-height:300px; margin-top:0.6rem; padding-top:0.6rem; }
    .expand-row { font-size:0.75rem; color:#94a3b8; margin-bottom:0.3rem; }
    .expand-row strong { color:#cbd5e1; }
    .expand-specs { display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:0.4rem; }
    .expand-specs .spec-link {
      font-size:0.65rem; background:rgba(255,215,0,0.08); color:#FFD700;
      padding:0.15rem 0.45rem; border-radius:4px; font-family:'JetBrains Mono',monospace;
    }
  </style>
</head>
<body>
  <div class="bl-main">
    <!-- Page Header -->
    <h1 class="page-title"><span class="gold">Feature</span> Backlog</h1>
    <p class="page-subtitle">Read-only backlog board &mdash; tracks features from request to completion</p>

    <!-- Stats Row -->
    <div class="stats-row" id="stats-row"></div>

    <!-- Search + Filter -->
    <div id="backlog-search"></div>

    <!-- Sort -->
    <div class="sort-bar">
      <label for="sort-select">Sort by:</label>
      <select id="sort-select">
        <option value="priority">Priority</option>
        <option value="progress">Progress</option>
        <option value="name">Name</option>
        <option value="date">Date</option>
      </select>
    </div>

    <!-- Board -->
    <div class="board">
      <div class="board-col" id="col-backlog">
        <div class="col-header">
          <span class="col-icon">&#x1F4CB;</span> Backlog <span class="col-count" id="cnt-backlog">0</span>
        </div>
        <div class="col-body" id="body-backlog"></div>
      </div>
      <div class="board-col" id="col-progress">
        <div class="col-header">
          <span class="col-icon">&#x26A1;</span> In Progress <span class="col-count" id="cnt-progress">0</span>
        </div>
        <div class="col-body" id="body-progress"></div>
      </div>
      <div class="board-col" id="col-done">
        <div class="col-header">
          <span class="col-icon">&#x2714;</span> Done <span class="col-count" id="cnt-done">0</span>
        </div>
        <div class="col-body" id="body-done"></div>
      </div>
    </div>
  </div>

  <script>
  (function() {
    var D = (window.DASHBOARD_DATA || {});
    var features = D.features || [];
    var backlog  = D.backlog  || [];

    var activeFilter = 'all';
    var activeSort   = 'priority';
    var searchTerm   = '';

    // ── Helpers ──────────────────────────────────────────────
    var priorityOrder = { P0:0, P1:1, P2:2, p0:0, p1:1, p2:2 };
    function priNum(p) { return priorityOrder[p] != null ? priorityOrder[p] : 9; }
    function priClass(p) { var n = String(p).toLowerCase(); return n === 'p0' ? 'badge-p0' : n === 'p1' ? 'badge-p1' : 'badge-p2'; }
    function effortLabel(e) { return e || '—'; }

    function isStale(dateStr) {
      if (!dateStr) return false;
      var d = new Date(dateStr);
      return (Date.now() - d.getTime()) > 7 * 86400000;
    }

    function matchFilter(pri) {
      if (activeFilter === 'all') return true;
      return String(pri).toLowerCase() === activeFilter;
    }

    function matchSearch(item) {
      if (!searchTerm) return true;
      var t = searchTerm.toLowerCase();
      return (item.name || '').toLowerCase().indexOf(t) !== -1 ||
             (item.description || '').toLowerCase().indexOf(t) !== -1;
    }

    function sortItems(arr) {
      var s = activeSort;
      return arr.slice().sort(function(a, b) {
        if (s === 'priority') return priNum(a.priority) - priNum(b.priority);
        if (s === 'progress') return (b.progress || 0) - (a.progress || 0);
        if (s === 'name')     return (a.name || '').localeCompare(b.name || '');
        if (s === 'date')     return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
        return 0;
      });
    }

    // ── Stats ────────────────────────────────────────────────
    function renderStats() {
      var inProg = features.filter(function(f) { return f.status !== 'complete'; }).length;
      var html = '';
      html += '<div class="stat-card"><div class="stat-value">' + features.length + '</div><div class="stat-label">Total Features</div></div>';
      html += '<div class="stat-card"><div class="stat-value">' + inProg + '</div><div class="stat-label">In Progress</div></div>';
      html += '<div class="stat-card"><div class="stat-value">' + backlog.length + '</div><div class="stat-label">Backlog Items</div></div>';
      document.getElementById('stats-row').innerHTML = html;
    }

    // ── Card HTML ────────────────────────────────────────────
    function cardHTML(item, type) {
      var pri  = item.priority || 'P1';
      var prog = item.progress || 0;
      var frC  = type === 'backlog' ? (item.frCount  || 0) : (item.requirements || []).length;
      var tsC  = type === 'backlog' ? (item.tsCount  || 0) : (item.tests || []).length;
      var tkC  = type === 'backlog' ? (item.taskCount || 0) : (item.tasks || []).length;

      var h = '<div class="bl-card" data-id="' + item.id + '">';
      h += '<div class="card-top">';
      h += '<span class="card-name">' + esc(item.name) + '</span>';
      h += '<div class="card-badges">';
      if (isStale(item.createdAt)) h += '<span class="stale-dot" title="Stale — no activity &gt; 7 days"></span>';
      h += '<span class="badge ' + priClass(pri) + '">' + esc(pri) + '</span>';
      if (type === 'feature' && item.phase) h += '<span class="badge badge-phase">' + esc(item.phase) + '</span>';
      if (type === 'backlog' && item.effort) h += '<span class="badge badge-effort">' + esc(effortLabel(item.effort)) + '</span>';
      h += '</div></div>';

      h += '<div class="progress-track"><div class="progress-fill" style="width:' + prog + '%"></div></div>';

      h += '<div class="card-stats">';
      h += '<span>FR ' + frC + '</span>';
      h += '<span>TS ' + tsC + '</span>';
      h += '<span>TK ' + tkC + '</span>';
      h += '</div>';

      // Expand section
      h += '<div class="card-expand">';
      if (item.description) h += '<div class="expand-row">' + esc(item.description) + '</div>';
      if (item.requestedBy) h += '<div class="expand-row"><strong>Requested by:</strong> ' + esc(item.requestedBy) + '</div>';
      if (item.createdAt) h += '<div class="expand-row"><strong>Created:</strong> ' + esc(item.createdAt) + '</div>';
      var specs = (item.requirements || []);
      if (specs.length) {
        h += '<div class="expand-specs">';
        specs.forEach(function(s) { h += '<span class="spec-link">' + esc(typeof s === 'string' ? s : s.id || s.name || '') + '</span>'; });
        h += '</div>';
      }
      h += '</div>';
      h += '</div>';
      return h;
    }

    function esc(s) {
      if (!s) return '';
      var el = document.createElement('span');
      el.textContent = String(s);
      return el.innerHTML;
    }

    // ── Render Board ─────────────────────────────────────────
    function render() {
      var backlogItems = sortItems(backlog.filter(function(b) {
        return matchFilter(b.priority) && matchSearch(b);
      }));
      var inProgress = sortItems(features.filter(function(f) {
        return f.status !== 'complete' && matchFilter(f.priority) && matchSearch(f);
      }));
      var done = sortItems(features.filter(function(f) {
        return f.status === 'complete' && matchFilter(f.priority) && matchSearch(f);
      }));

      document.getElementById('cnt-backlog').textContent  = backlogItems.length;
      document.getElementById('cnt-progress').textContent  = inProgress.length;
      document.getElementById('cnt-done').textContent      = done.length;

      var hB = ''; backlogItems.forEach(function(b) { hB += cardHTML(b, 'backlog'); });
      var hP = ''; inProgress.forEach(function(f)   { hP += cardHTML(f, 'feature'); });
      var hD = ''; done.forEach(function(f)          { hD += cardHTML(f, 'feature'); });

      document.getElementById('body-backlog').innerHTML  = hB || '<p style="color:#64748b;font-size:0.8rem;">No items</p>';
      document.getElementById('body-progress').innerHTML = hP || '<p style="color:#64748b;font-size:0.8rem;">No items</p>';
      document.getElementById('body-done').innerHTML     = hD || '<p style="color:#64748b;font-size:0.8rem;">No items</p>';

      bindCards();
    }

    // ── Card Expand/Collapse ─────────────────────────────────
    function bindCards() {
      var cards = document.querySelectorAll('.bl-card');
      cards.forEach(function(c) {
        c.onclick = function() { c.classList.toggle('expanded'); };
      });
    }

    // ── Sort Dropdown ────────────────────────────────────────
    document.getElementById('sort-select').addEventListener('change', function() {
      activeSort = this.value;
      render();
    });

    // ── Init Search ──────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof SDD !== 'undefined' && SDD.search) {
        SDD.search.init('backlog-search', {
          placeholder: 'Search backlog...',
          filters: [
            { label: 'P0 Critical',     value: 'p0' },
            { label: 'P1 Standard',     value: 'p1' },
            { label: 'P2 Nice-to-Have', value: 'p2' }
          ],
          onSearch: function(term) { searchTerm = term; render(); },
          onFilter: function(f)    { activeFilter = f;  render(); }
        });
      }
      renderStats();
      render();
    });
  })();
  </script>
</body>
</html>
